<div class="viewer-overlay" (click)="onClose()">
    <div class="viewer-container glass-morphism" (click)="$event.stopPropagation()">
        <header class="viewer-header">
            <div class="header-info">
                <h2 class="feed-name">{{ feed.name }}</h2>
                <span class="feed-location">{{ feed.location }}</span>
            </div>
            <button class="close-btn" (click)="onClose()">
                <i data-lucide="x"></i>
            </button>
        </header>

        <div class="video-section">
            <div class="video-wrapper">
                <ng-container *ngIf="feed.wsUrl && feed.status === 'online'; else otherFeeds">
                    <canvas #canvas class="video-feed" [style.transform]="'scale(' + controls.zoomScale + ')'"></canvas>
                </ng-container>
                <ng-template #otherFeeds>
                    <video #video *ngIf="feed.streamUrl; else useThumbnail" [src]="feed.streamUrl"
                        [poster]="feed.thumbnail" class="video-feed" autoplay muted controls
                        [style.transform]="'scale(' + controls.zoomScale + ')'"></video>
                    <ng-template #useThumbnail>
                        <img [src]="feed.thumbnail" class="video-feed" alt="Live Feed"
                            [style.transform]="'scale(' + controls.zoomScale + ')'">
                    </ng-template>
                </ng-template>

                <div class="video-overlay-top">
                    <div class="overlay-left">
                        <div class="rec-indicator" *ngIf="controls.isRecording">
                            <span class="rec-dot"></span>
                            REC
                        </div>
                        <div class="quality-badge" [class.hd]="currentQuality === 'high'">
                            {{ currentQuality === 'high' ? 'HD' : 'SD' }}
                        </div>
                    </div>
                    <div class="timestamp">
                        {{ '2026-02-18 11:54:22' }} <!-- Simulated live timestamp -->
                    </div>
                </div>

                <div class="video-controls">
                    <div class="control-group">
                        <button class="control-btn" (click)="toggleQuality()" [class.active]="currentQuality === 'high'"
                            title="Toggle Quality (HD/SD)">
                            <i data-lucide="settings-2"></i>
                            <span class="btn-label">{{ currentQuality === 'high' ? 'HD' : 'SD' }}</span>
                        </button>
                    </div>

                    <div class="control-group center">
                        <button class="control-btn" (click)="setZoom(-0.2)" title="Zoom Out"
                            [disabled]="controls.zoomScale <= 1">
                            <i data-lucide="zoom-out"></i>
                        </button>
                        <div class="zoom-level" (click)="resetZoom()">{{ (controls.zoomScale * 100).toFixed(0) }}%</div>
                        <button class="control-btn" (click)="setZoom(0.2)" title="Zoom In"
                            [disabled]="controls.zoomScale >= 3">
                            <i data-lucide="zoom-in"></i>
                        </button>
                    </div>

                    <div class="control-group">
                        <button class="control-btn" (click)="toggleFullscreen()" title="Full Screen">
                            <i data-lucide="maximize"></i>
                        </button>
                        <button class="control-btn" (click)="captureScreenshot()" title="Screenshot"><i
                                data-lucide="camera"></i></button>
                    </div>
                </div>
            </div>
