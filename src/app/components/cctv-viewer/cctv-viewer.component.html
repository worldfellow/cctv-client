<div class="viewer-overlay" (click)="onClose()">
    <div class="viewer-container glass-morphism" (click)="$event.stopPropagation()">
        <header class="viewer-header">
            <div class="header-info">
                <h2 class="feed-name">{{ feed.name }}</h2>
                <span class="feed-location">{{ feed.location }}</span>
            </div>
            <button class="close-btn" (click)="onClose()">
                <i data-lucide="x"></i>
            </button>
        </header>

        <div class="video-section">
            <div #videoWrapper class="video-wrapper" 
                (mousedown)="startDragging($event)" 
                (mousemove)="drag($event)" 
                (mouseup)="stopDragging()"
                (mouseleave)="stopDragging()"
                [class.is-zoomed]="controls.zoomScale > 1"
                [class.is-dragging]="controls.isDragging">
                
                <!-- Loading Quality Indicator -->
                <div class="quality-loader" *ngIf="loadingQuality">
                    <div class="spinner"></div>
                    <span>Switching Quality...</span>
                </div>

                <ng-container *ngIf="activeWsUrl && feed.status === 'online'; else otherFeeds">
                    <canvas #canvas class="video-feed" 
                        [style.transform]="'scale(' + controls.zoomScale + ') translate(' + controls.panX/controls.zoomScale + 'px, ' + controls.panY/controls.zoomScale + 'px)'"></canvas>
                </ng-container>
                <ng-template #otherFeeds>
                    <video #video *ngIf="feed.streamUrl; else useThumbnail" [src]="feed.streamUrl"
                        [poster]="feed.thumbnail" class="video-feed" autoplay muted controls
                        [style.transform]="'scale(' + controls.zoomScale + ') translate(' + controls.panX/controls.zoomScale + 'px, ' + controls.panY/controls.zoomScale + 'px)'"></video>
                    <ng-template #useThumbnail>
                        <img [src]="feed.thumbnail" class="video-feed" alt="Live Feed"
                            [style.transform]="'scale(' + controls.zoomScale + ') translate(' + controls.panX/controls.zoomScale + 'px, ' + controls.panY/controls.zoomScale + 'px)'">
                    </ng-template>
                </ng-template>

                <div class="video-overlay-top">
                    <div class="timestamp">
                        {{ '2026-02-18 11:54:22' }} <!-- Simulated live timestamp -->
                    </div>
                </div>

                <div class="video-controls">
                    <div class="control-group">
                        <button class="control-btn" (click)="setZoom(-0.2)" title="Zoom Out"
                            [disabled]="controls.zoomScale <= 1">
                            <i data-lucide="zoom-out"></i>
                        </button>
                        <div class="zoom-level" (click)="resetZoom()">{{ (controls.zoomScale * 100).toFixed(0) }}%</div>
                        <button class="control-btn" (click)="$event.stopPropagation(); setZoom(0.2)" title="Zoom In"
                            [disabled]="controls.zoomScale >= 3">
                            <i data-lucide="zoom-in"></i>
                        </button>
                    </div>

                    <div class="control-group pan-controls" *ngIf="controls.zoomScale > 1">
                        <button class="control-btn mini" (click)="$event.stopPropagation(); pan(0, 50)" title="Move Up">
                            <i data-lucide="chevron-up"></i>
                        </button>
                        <button class="control-btn mini" (click)="$event.stopPropagation(); pan(0, -50)" title="Move Down">
                            <i data-lucide="chevron-down"></i>
                        </button>
                        <button class="control-btn mini" (click)="$event.stopPropagation(); pan(50, 0)" title="Move Left">
                            <i data-lucide="chevron-left"></i>
                        </button>
                        <button class="control-btn mini" (click)="$event.stopPropagation(); pan(-50, 0)" title="Move Right">
                            <i data-lucide="chevron-right"></i>
                        </button>
                    </div>

                    <div class="zoom-hint" *ngIf="controls.zoomScale > 1">
                        Drag to move
                    </div>

                    <div class="control-group">
                        <button class="control-btn" (click)="toggleFullscreen()" title="Full Screen">
                            <i data-lucide="maximize"></i>
                        </button>
                        <button class="control-btn" (click)="captureScreenshot()" title="Screenshot"><i
                                data-lucide="camera"></i></button>
                    </div>

                    <!-- Quality Selector -->
                    <div class="control-group quality-selector">
                        <button class="quality-btn" [class.active]="currentQuality === 'high'" (click)="changeQuality('high')">HD</button>
                        <button class="quality-btn" [class.active]="currentQuality === 'ultra'" (click)="changeQuality('ultra')">ULTRA HD</button>
                    </div>
                </div>
            </div>

        <!-- Screenshot Error Message -->
        <div class="screenshot-error-alert" *ngIf="screenshotError">
            <i data-lucide="alert-circle"></i>
            <span>{{ screenshotError }}</span>
            <button (click)="screenshotError = ''" class="close-error">×</button>
        </div>
