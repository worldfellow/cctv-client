<div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar glass-morphism" [class.collapsed]="!isSidebarOpen" [class.open]="isSidebarOpen">
        <div class="sidebar-header" *ngIf="config$ | async as config">
            <div class="logo" (click)="toggleEnlargedLogo()" title="View full logo">
                <img *ngIf="config.logoUrl" [src]="config.logoUrl" alt="Logo" class="logo-img">
                <i *ngIf="!config.logoUrl" data-lucide="shield" class="logo-icon"></i>
                <span class="logo-text">{{ config.appName }}</span>
            </div>
        </div>

        <nav class="sidebar-nav" *ngIf="user$ | async as user">
            <a *ngIf="hasMenuAccess(user, 'dashboard')" routerLink="/dashboard" routerLinkActive="active"
                class="nav-item" (click)="onNavClick()" [attr.data-tooltip]="!isSidebarOpen ? 'Dashboard' : null">
                <i data-lucide="layout-grid"></i>
                <span>Dashboard</span>
            </a>
            <a *ngIf="hasMenuAccess(user, 'users')" routerLink="/users" routerLinkActive="active" class="nav-item"
                (click)="onNavClick()" [attr.data-tooltip]="!isSidebarOpen ? 'User Management' : null">
                <i data-lucide="users"></i>
                <span>User Management</span>
            </a>
            <a *ngIf="hasMenuAccess(user, 'colleges')" routerLink="/colleges" routerLinkActive="active" class="nav-item"
                (click)="onNavClick()" [attr.data-tooltip]="!isSidebarOpen ? 'Colleges' : null">
                <i data-lucide="building-2"></i>
                <span>Colleges</span>
            </a>
            <a *ngIf="isSuperAdmin(user)" routerLink="/devicesetup" routerLinkActive="active"
                class="nav-item" (click)="onNavClick()" [attr.data-tooltip]="!isSidebarOpen ? 'Device Setup' : null">
                <i data-lucide="server"></i>
                <span>Device Setup</span>
            </a>
            <a *ngIf="hasMenuAccess(user, 'add-camera')" routerLink="/add-camera" routerLinkActive="active"
                class="nav-item" (click)="onNavClick()" [attr.data-tooltip]="!isSidebarOpen ? 'Camera Setup' : null">
                <i data-lucide="video"></i>
                <span>Camera Setup</span>
            </a>
            <a *ngIf="isSuperAdmin(user) || hasMenuAccess(user, 'access-control')" routerLink="/access-control"
                routerLinkActive="active" class="nav-item" (click)="onNavClick()"
                [attr.data-tooltip]="!isSidebarOpen ? 'Access Control' : null">
                <i data-lucide="shield"></i>
                <span>Access Control</span>
            </a>
            <a *ngIf="hasMenuAccess(user, 'screenshots')" routerLink="/screenshots" routerLinkActive="active"
                class="nav-item" (click)="onNavClick()" [attr.data-tooltip]="!isSidebarOpen ? 'Screenshots' : null">
                <i data-lucide="image"></i>
                <span>Screenshots</span>
            </a>
            <a *ngIf="isSuperAdmin(user)" routerLink="/branding-settings" routerLinkActive="active" class="nav-item"
                (click)="onNavClick()" [attr.data-tooltip]="!isSidebarOpen ? 'Branding Settings' : null">
                <i data-lucide="settings"></i>
                <span>Branding Settings</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="logout-btn" (click)="logout()" [attr.data-tooltip]="!isSidebarOpen ? 'Logout' : null">
                <i data-lucide="log-out"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" [class.show]="isSidebarOpen && isMobile" (click)="toggleSidebar()"></div>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-nav glass-morphism">
            <div class="nav-left" *ngIf="config$ | async as config">
                <button class="menu-toggle" (click)="toggleSidebar()">
                    <i data-lucide="menu"></i>
                </button>
                <h2 class="page-title">{{ config.appName }}</h2>
            </div>

            <div class="nav-right">
                <!-- Theme Switcher -->
                <div class="theme-switcher">
                    <button class="theme-toggle-btn" (click)="toggleThemeMenu()" title="Change Theme">
                        <i data-lucide="palette"></i>
                    </button>

                    <div class="theme-menu glass-morphism" *ngIf="showThemeMenu" (click)="$event.stopPropagation()">
                        <div class="menu-header">Select Theme</div>
                        <div class="theme-options">
                            <button class="theme-opt white" [class.active]="(themeService.theme$ | async) === 'white'"
                                (click)="changeTheme('white')">
                                <span class="preview"></span>
                                <span>White</span>
                            </button>
                            <button class="theme-opt midnight"
                                [class.active]="(themeService.theme$ | async) === 'midnight'"
                                (click)="changeTheme('midnight')">
                                <span class="preview"></span>
                                <span>Midnight</span>
                            </button>
                            <button class="theme-opt obsidian"
                                [class.active]="(themeService.theme$ | async) === 'obsidian'"
                                (click)="changeTheme('obsidian')">
                                <span class="preview"></span>
                                <span>Obsidian Gold</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Search..." [(ngModel)]="searchQuery">
                </div> -->
                <div class="user-profile" *ngIf="user$ | async as user">
                    <div class="avatar">
                        <img [src]="'https://ui-avatars.com/api/?name=' + (user.firstName + '+' + user.lastName) + '&background=6366f1&color=fff'"
                            alt="User">
                    </div>
                    <div class="user-info">
                        <span class="name">{{ user.firstName }} {{ user.lastName }}</span>
                        <span class="role">{{ user.role }}</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-body">
            <router-outlet></router-outlet>
        </div>
    </main>

    <!-- Enlarged Logo Modal -->
    <div class="enlarged-logo-overlay" *ngIf="isLogoEnlarged" (click)="toggleEnlargedLogo()">
        <ng-container *ngIf="config$ | async as config">
            <div class="enlarged-logo-container" (click)="$event.stopPropagation()">
                <button class="close-btn" (click)="toggleEnlargedLogo()">
                    <i data-lucide="x"></i>
                </button>
                <img *ngIf="config.logoUrl" [src]="config.logoUrl" alt="Enlarged Logo">
                <div *ngIf="!config.logoUrl" class="placeholder-large">
                    <i data-lucide="shield"></i>
                    <h2>{{ config.appName }}</h2>
                </div>
            </div>
        </ng-container>
    </div>
</div>
